body:
  text: 郭子魏明帝世使后弟毛曾與夏侯太初共坐時人謂蒹葭倚玉樹御覽四百四十七時目夏侯太初朗如明月入懷御覽四百四十七許允婦是阮德如妹奇醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意宜察之許便入見婦即出提裙裾待之許謂婦曰婦有四德卿有幾答曰新婦所乏唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慚色遂雅相重初學記十九六帖二十一御覽三百八十二許允為吏部郎多用其鄉里帝遣虎賁收允婦出閣戒允曰明主可以理奪難以情求允至明帝核之允答曰舉爾所知臣臣鄉人臣所知也願陛下檢校為稱職與否若不稱職臣宜受其罪既檢校皆官得其人於是乃釋允舊服敗壞詔賜新衣初被收舉家號哭允新婦自云無憂尋還作粟粥待之須臾允至類聚四十八書鈔六十又一百四十四御覽八百五十九孫秀降晉武帝厚存寵之妻以姨妹蒯氏室家甚穆蒯嘗妬乃罵秀為貉子秀大不平之遂出不復入蒯氏自悔責請救於武帝時大赦群臣咸見既出帝獨留秀從容言曰天下曠蕩蒯夫人可得從其例不秀免冠謝遂為夫婦如初類聚五十二又三十五御覽六百五十二賈公閭女悅韓壽問婢識否一婢云是其故主女內懷存想婢後往壽家説如此壽乃令婢通己意女大喜遂與通御覽五百與韓壽通者乃是陳騫女世説惑溺篇注騫以韓壽為掾每會聞壽有異香氣是外國所貢一著衣歷日不歇騫計武帝唯賜己及賈充他家理無此香嫌壽與己女通考問左右婢具以實對騫即以女妻壽御覽九百八十一未婚而女亡壽因娶賈氏故世因傳賈充女世説惑溺篇注案二説不同蓋前一説是世俗所傳後一説則郭氏論斷也王汝南少無婚處自求郝普女郝氏襄城人父匡字仲時一名普洛陽太守司空以為癡會無往婚對其音樂便許之御覽四百九十王東海初過江王丞字安期東海內史登琅邪山歎曰我由來不愁今日直欲愁類聚三十五太傅云當爾時形神俱往御覽四百六十九王安期為東海太守小吏盜池中魚綱紀推之王曰與衆共之魚何足吝御覽四百九十九潘安仁夏侯湛並有美容貌嘗同行人謂之連璧初學記十九御覽三百八十冀州刺史楊準二子喬字國彥髦字士彥清平有識一引誤作楊淮字彥清俱總角為成器準與裴頠樂廣友善遣見之頠謂準曰喬當及卿髦小減也廣謂準曰喬自及卿髦尤精出準笑曰我二兒之優劣乃裴樂之優劣論者皆許之御覽四百九又四百四十四王渾與婦鍾氏共坐見武子從庭前過渾謂婦曰生兒如是足慰人意婦笑曰若使新婦得配參軍生兒故可不翅如此參軍是渾中弟名淪字太沖為晉文王大將軍從征壽春遇疾亡時人惜焉御覽三百九十一王渾妻鍾生女甚賢明令武子為妹擇佳壻而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地也自可貴要當令我見之於是武子令此兵與群小雜處使母微察之母曰刑衣者汝可拔乎武子曰是母曰此才足以拔萃然地寒非長年不足展其才用觀其形骨恐不可與婚數年果死御覽四百四十四王武子衛玠之舅也語人曰昨與吾外甥並坐炯然若明珠之在我側朗然來映人後卒人謂之看殺初學記十九孫子荊上品狀王武子時為大中正謂訪聞此人非卿能拔自為之目已上十八字依御覽引補曰天下英博亮拔不群文選任昉齊竟陵文宣王行狀注御覽二百六十五又四百四十七王夷甫雅尚玄遠又疾其婦貪口未嘗言錢婦欲試之夜令婢以錢繞床不得待夷甫晨起見錢閡之令婢舉阿堵物類聚六十六王夷甫婦郭太寧女才拙而性剛聚斂無厭夷甫患之以上四句亦見御覽四百九十二而不能禁時其鄉人幽州刺史李陽景都大俠猶漢之樓護郭氏甚憚之夷甫驟諫之乃云非但我言卿不可李陽景亦謂不可郭氏乃為少損御覽六百二十七杜預拜鎮南將軍朝士悉至皆坐連榻羊稚舒後至曰杜元凱乃復以連榻坐客不坐而去書鈔一百三十三御覽七百六陸士衡初入洛張公云宜詣劉真長於是二陸既往劉尚在哀制性嗜酒禮畢初無他言唯問東吳有長柄壺盧齊民要術十引此句作長柄瓠卿得種不陸兄弟殊失望乃云悔往御覽三百八十九陸士衡詣王武子武子有數斛羊酪指示陸機曰卿東吳何以敵此機曰千里蓴羹未下鹽豉御覽八百六十一又八百五十八書鈔一百三十五盧志於衆中問陸士衡陸抗是卿何物答曰如卿於盧育士龍失色既出戶謂兄曰何至於此彼或有不知士衡正色曰我祖父名播海內寧有不知識者疑兩陸優劣謝安以此定之御覽三百八十八滿奮字武秋高平人畏風在武帝坐北窗作琉璃扉實密似疏奮有難色帝問之一引作帝乃笑之對曰臣若吳牛見月而喘御覽一百八十八又八百九十九劉道真少時漁釣而憊於草澤善歌嘯聞之者無不留連有一老嫗識其非常人甚樂其歌嘯乃殺豚進之道真食豚盡了不謝已上亦見御覽三百九十二嫗見其不飽又進一豚又食半餘半還之後道真為吏部郎嫗兒為小令史道真乃超用之兒不知所由問母而後知之于是齎牛酒以詣道真道真笑曰去去無可復相報者類聚九十四又十九六帖六十二御覽二百十九劉道真嘗為徒扶風王駿以五匹布贖之既而用為從事中郎書鈔六十八當時以為美談御覽六百四十二又八百二十周叔治為晉陵周侯仲智送之叔治將別泣涕不止仲智恚之曰困人及婦人別惟知啼便捨去周侯獨留與飲酒言語臨別留涕撫其背曰阿拿自愛御覽四百八十九周伯仁道桓茂倫欽奇歷落可笑之人也或云是謝幼輿言御覽四百四十七將軍王敦起事丞相導率諸兄弟詣闕請罪值周侯將入見諸王甚有憂色丞相呼周侯曰伯仁以百口賴卿周侯直過不應苦相申救既許周大悅飲酒及出諸王猶在門又呼顗顗不與言顧左右曰今年已上十三字書鈔引止作一曰字此依御覽殺諸賊奴當取一金印如斗大繫肘書鈔一百三十一御覽六百八十二郤太尉晚節絶好談論既非所經而甚矜之書鈔九八十王丞相性儉節帳下甘果盈溢不散入春爛敗已上亦見御覽九百六十四都督白之公令拾去敕云不可使大郎知大郎名悅字長豫案二句是注御覽四百三十一王丞相云雒下論以我比安期千里我亦不推此二人唯共推王太尉夷甫也御覽四百四十七王丞相治揚州廨舍案行而言我正為次道理此耳何次道少為王公所知重故有此歎御覽二百五十五王丞相言刁元亮之察察戴若思之巖巖卞望之峰炬並一見我而服也御覽四百四十七王丞相拜司空廷尉作兩角髻葛裙拄杖臨路邊窺之歎曰人言阿龍超阿龍故自超不覺步至臺門御覽三百九十四王公有幸妾姓雷頗與政事納貨蔡公謂之雷尚書御覽二百十二庾公名位漸重足傾王公時庾亮在石頭王公在冶城忽風起揚塵王公以扇拂之曰元規塵汙人元規庾亮字王公王導也類聚六六帖三王丞相未令不看事書鈔三十六案文有訛挩謝公在東山畜妓簡文曰安石必出與人同樂亦何得不與人同憂謝安石也書鈔一百十初學記十五御覽五百六十八有注人問謝太傅王子敬可與先輩誰比謝答曰阿敬近王劉之間王修劉真長御覽四百四十七王子敬問謝公嘉賓何如道季答云道季誠抄撮清悟嘉賓故自勝桓公稱云鏘鏘有文武御覽四百四十七桓公問孔西陽安石何如文度孔思未答反問公謂何如答曰安石居然不可陸踐御覽四百四十七何次道嘗詣王丞相以麈尾礭床呼何共坐曰來來此是君坐御覽一引作此君子坐也書鈔一百三十四御覽三百九十二有注又七百三王含為廬江貪強狼藉王敦欲護其兄故于衆坐中稱家兄在郡為政定善廬江人咸稱之時何充為主簿在坐正色曰充即廬江人所聞異於此敦默然傍人為之反側充神意自若御覽四百九十二又四百二十八劉真長云見何幼道飲酒人傾家釀何唯字幼道也書鈔一百四十八劉尹道桓溫鬚如反蝟毛眼如紫石稜自是孫仲謀一流人也御覽三百六十八琅邪諸葛亡名面病鼠瘻劉真長視之歎曰鼠乃復窟穴人面乎書鈔一百五十八御覽三百六十五王右軍道劉真長樹雲柯而不扶疏御覽四百四十七許侍郎顧司空俱作王丞相從事嘗夜在丞相許戲二人歡極丞相便使入己帳中眠顧至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦難眠處耳御覽六百九十九又三百九十三時有為王遵主簿檢校帳下遵説語主簿欲與主簿周旋無為知人几案間事書鈔六十九海西時朝堂猶暗惟會稽王來軒軒如朝霞之舉書鈔七十初熒惑入太微尋廢海西簡文既登祚復入太微帝惡之時郗超為中書郎在直引超入曰天命修短故非所計當無復近日事不超曰大司馬方外固封疆內鎮社稷必無若斯之慮臣為陛下保之簡文因誦庾仲初詩曰士痛朝危臣哀主辱其聲甚悽愴郗受假還東帝曰致意尊公家國之事遂至於此由身不能以道匡衡思患豫防愧歎之深言何能譬因泣下御覽四百六十九簡文云謝安南清泠如其弟學藝不如孔嚴御覽四百四十七晉撫軍云何平叔巧纍於理嵇叔夜雋傷其道續談助四佛經以為祛治神明則聖可致簡文云不知便可登峰造極然陶冶之功故不可續談助四王長史求東陽撫軍不肯用王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之長史曰人言會稽王癡真癡也會稽王簡文先封也御覽七百三十九又四百九十王仲祖謝仁祖同為王公掾在坐長史云謝仁祖能作異舞王公命為之書鈔一百七謝便起舞神意甚暇王公熟視謂諸客曰令人思王安豐御覽二百四十九王仲祖酒酣起舞劉真長曰阿奴今日不復減向子期書鈔一百七王仲祖云真長知我勝我自知御覽四百四十四人有問王長史江霦群從兄弟者王答云諸江皆能自生活御覽四百四十七劉王共在航南酣宴謝鎮西往尚書墓還是葬後三日諸人欲要之真長云仁祖應來便遣要之果即回駕諸人迎之把臂便下裁得脫幘酣宴半坐乃覺未得脫衰御覽五百四十七王長史病已篤寢臥燈下轉麈尾而視之歎曰如此人曾不得滿四十及亡劉尹臨殯以犀柄尾著棺中御覽一引作以璧柄麈尾置柩中因慟絶御覽三百九十三又七百三書鈔一百三十四范玄平在簡文坐談欲屈引王長史曰卿助我王曰此非拔山之力所能救書鈔九十八類聚五十五御覽六百十七張憑舉孝廉出京負其才氣必謂參時彥欲詣劉真長卿里及同舉者咸共哂之張遂徑往詣劉既前處之下坐通寒暑而已真長方洗濯料事神意不接良久張欲自發而未有其請頃之王長史諸賢來詣言各有隔而不通處張忽遙於末坐判之言約旨遠便足以暢彼我之懷舉坐皆驚真長延之上坐遂清言彌日因留宿遂復至曉張退劉曰卿且前去我正爾往取卿共詣撫軍張既還船同侶笑之曰卿何許宿還張笑而不答須臾真長至遣教覓張孝廉船同侶惋愕既同載俱詣撫軍至門劉前進謂撫軍曰下官今日為公得一太常博士妙選既前撫軍與之語咨嗟稱善數日乃止曰張憑徑粹為理之窟即用為太常博士御覽六百十七又二百二十九書鈔六十七類聚四十六許玄度在西州講韓王諸人並在坐林公每欲小屈孫興公曰法師今日如著敝絮在荊棘間行觸地挂礙書鈔九十八梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒出為設果有楊梅孔指示兒曰此貴君家果兒應聲答曰未聞孔雀是夫子家禽類聚九十一又八十七六帖二十又九十九御覽三百八十五又四百六十七又五百十八又九百二十四案御覽四百六十四引作楊修字德祖孔君平作孔文舉金樓子又以為楊周七歲時事孫安國盛字安國往殷中軍許共語殷名浩也往反精苦賓主無間左右進食冷而復暖者數四彼我奮擲麈尾毛悉墮落滿餐飯中賓主遂至暮忘飱書鈔一百三十四御覽七百三殷方語孫卿曰公勿作強口馬我當併卿控孫亦曰卿勿作冗鼻牛我當穿卿頰御覽三百九十殷浩作揚州尹行日小暮便命左右取被幞人問其故答曰刺史嚴不敢夜行類聚七十御覽七百七殷中軍廢後恨簡文曰上人著百尺樓上擔梯將去初學記二十四陶公自上流來赴蘇峻之亂含怒於庾公庾公謂必戮己進退無計溫公乃勸詣陶公卿但徑拜必無他我為卿保之庾殊未了而不得不往乃從溫言詣陶已上六句見御覽引至便拜庾風姿雅潤陶見拜不覺自起止之曰庾元規何緣拜陶士行書鈔八十五御覽五百四十二庾公為護軍屬桓廷尉為索一柱吏桓後遇見徐寧而知之致與庾公而稱云是海內清士御覽四百二十六世中稱庾文康為豐年玉庾稚恭為荒年榖御覽四百四十七庾道季云藺相如雖千載死人凜凜恆如有生氣曹蜍李志雖見在厭厭如在九泉下類聚二十二御覽四百四十七畢茂世云一手持蟹螯一手持杯拍浮酒池中可了一生哉御覽九百四十二桓公年少至貧嘗樗蒲失數百斛米齒既惡意亦沮自審不復振乃請救於袁彥道桓具以情告已上世説注引作桓公樗蒲失數百斛米求救於袁耽袁在艱中欣然無忤便云大快御覽引有欣然句次作便即俱去出門云我不但拔卿要為卿破之我必作快齒卿但快喚已上四句世説注引作我必作采卿但大喚即脫其衰共出門去覺頭上有巾帽擲去著小帽已上五句世説注引有之既戲袁形勢呼咀慨牡擲必盧雉二人齊叫敵家震懼喪氣俄傾獲數百萬已上二句世説注引作故家頃刻失數百萬也世説任誕篇注御覽七百五十四桓大司馬病篤桓溫字元子也謝公省病謝安字安石也從東門入桓遙矚而歎曰吾門中不久復見如此客御覽四百五衛晨為桓公長史溫公甚重之每宴率爾提酒脯以就衛相對也書鈔一百四十四孫興公道曹輔佐云才如白地明光錦裁為負版袴非無文綵然酷無裁製書鈔一百二十九御覽六百九十五祖士少道右軍王家阿菟何緣復減處仲右軍道祖士少風領毛骨恐沒世不復見如此人王子猷説世目士少為清邁我家亦以為徹朗御覽四百四十七承指辟王藍田為掾庾公問丞相藍田何似王曰書鈔六十八真獨簡貴不減父祖然曠淡處故當不如爾三句原挩今依世説品藻篇補光祿王蘊指廳前劈曰我嘗在下得殘盤冷炙書鈔一百四十五御覽七百五十八引云王光群曰正得殘槃冷炙殷仲堪云三日不讀道德經便覺舌本間強類聚十七御覽三百六十七王佛大曰三日不飲酒覺形神不復相和親也酒自引人入勝地耳書鈔一百四十八謝萬嘗詣王恬既至坐少時恬便入內謝殊有喜色謂必厚供待良久已上三句類聚引有沐頭散髮而出既亦不復坐乃倨坐于胡床在于中庭曬髮神色傲上了無慚怍相對于是而退書鈔一百三十五類聚七十謝哲字穎豫陳郡人也美風儀舉止蘊藉而襟懷豁然為士君子所重御覽三百八十萍之依水猶卉植地靡見其布漠爾鱗被物有常託孰知所自御覽一千案文是郭景純萍贊疑御覽誤題也
